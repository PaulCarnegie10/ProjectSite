backend:
  name: github
  repo: PaulCarnegie10/ProjectSite
  branch: main
  base_url: https://sveltia-cms-auth.paulcolombo.workers.dev

media_folder: public/projects
public_folder: projects

collections:
  - name: projects
    label: Projects
    folder: src/content/projects
    format: json
    extension: json
    create: true
    identifier_field: title
    slug: '{{fields.slug}}'
    summary: '{{title}}'
    fields:
      - { name: index, label: Order, widget: number, value_type: int, hint: '1 renders first everywhere' }
      - { name: slug, label: URL slug, widget: string, pattern: ['^[a-z0-9-]+$', 'lowercase letters, numbers and dashes only'] }
      - { name: title, label: Title, widget: string }
      - { name: pitch, label: Pitch, widget: text, hint: 'One or two punchy sentences — home slab + projects index card' }
      - { name: tags, label: Tags, widget: list, default: [] }
      - { name: side, label: Text side (home slab), widget: select, options: [left, right] }
      - name: accent
        label: Accent glow
        widget: select
        options:
          - { label: Orchid pink, value: 'rgba(255,110,199,0.22)' }
          - { label: Violet, value: 'rgba(183,140,255,0.22)' }
          - { label: Sky blue, value: 'rgba(108,196,255,0.20)' }
      - { name: cover, label: Cover image (home slab), widget: image, required: false, hint: 'Leave empty for the typographic slab look' }
      - { name: tagline, label: Deep-dive tagline, widget: text }
      - name: meta
        label: Meta
        widget: object
        fields:
          - { name: timeframe, widget: string }
          - { name: role, widget: string }
          - { name: status, widget: string, hint: 'e.g. In progress / Shipped / Presented' }
      - name: sections
        label: Story sections
        widget: list
        fields:
          - { name: heading, widget: string }
          - name: body
            label: Paragraphs
            widget: list
            field: { name: paragraph, label: Paragraph, widget: text }
      - name: media
        label: Media gallery
        widget: list
        required: false
        default: []
        fields:
          - { name: type, widget: select, options: [image, video] }
          - { name: src, label: File, widget: file }
          - { name: caption, widget: string, required: false }
      - name: links
        label: Extra links
        widget: list
        required: false
        default: []
        fields:
          - { name: label, widget: string }
          - { name: href, widget: string, hint: 'Full URL, or a public/ relative path like projects/bee-tracker/poster.pdf' }

  - name: news
    label: News
    folder: src/content/news
    format: json
    extension: json
    create: true
    identifier_field: title
    slug: '{{fields.date}}-{{fields.title}}'
    summary: '{{date}} — {{title}}'
    sortable_fields: [date]
    fields:
      - { name: date, widget: string, pattern: ['^\d{4}-\d{2}-\d{2}$', 'YYYY-MM-DD'], hint: 'Newest date shows first; home page shows the latest three' }
      - { name: tag, widget: string, hint: 'Short category chip, e.g. Research / Internship / Robotics' }
      - { name: title, widget: string }
      - { name: body, widget: text }
      - name: link
        label: External link
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: label, widget: string, required: false }
          - { name: href, widget: string, required: false }

  - name: site
    label: Site content
    files:
      - name: skills
        label: Skills
        file: src/content/skills.json
        fields:
          - name: groups
            label: Skill groups
            widget: list
            fields:
              - { name: label, widget: string }
              - { name: blurb, widget: string }
              - name: items
                widget: list
                fields:
                  - { name: name, widget: string }
                  - { name: icon, widget: string, required: false, hint: 'react-icons Simple Icons key, e.g. SiPytorch — must be imported in Skills.jsx' }

      - name: text
        label: 'Text & headings'
        file: src/content/site.json
        fields:
          - name: hero
            label: Hero
            widget: object
            required: true
            fields:
              - { name: eyebrow, label: 'Hero eyebrow', widget: string, required: true }
              - { name: lines, label: 'Hero name lines (2 lines, e.g. PAUL / COLOMBO)', widget: list, required: true, field: { name: line, widget: string } }
              - { name: tagline, label: 'Hero tagline', widget: string, required: true }
              - { name: ctaPrimary, label: 'Hero primary button label', widget: string, required: true }
              - { name: ctaSecondary, label: 'Hero secondary button label', widget: string, required: true }
              - { name: scrollCue, label: 'Hero scroll cue label', widget: string, required: true }

          - name: about
            label: About
            widget: object
            required: true
            fields:
              - { name: eyebrow, label: 'About eyebrow', widget: string, required: true }
              - { name: titlePre, label: 'About heading — before accent', widget: string, required: true }
              - { name: titleAccent, label: 'About heading — accent word', widget: string, required: true }
              - { name: titlePost, label: 'About heading — after accent', widget: string, required: true }
              - { name: chips, label: 'About stat chips', widget: list, required: true, field: { name: chip, widget: string } }
              - { name: caption, label: 'About photo caption', widget: string, required: true }
              - { name: paragraph1Pre, label: 'About paragraph 1 — part 1', widget: string, required: true }
              - { name: paragraph1Accent1, label: 'About paragraph 1 — accent 1', widget: string, required: true }
              - { name: paragraph1Mid, label: 'About paragraph 1 — part 2', widget: string, required: true }
              - { name: paragraph1Accent2, label: 'About paragraph 1 — accent 2', widget: string, required: true }
              - { name: paragraph1Post, label: 'About paragraph 1 — part 3', widget: string, required: true }
              - { name: paragraph2, label: 'About paragraph 2', widget: text, required: true }

          - name: sections
            label: Section headings
            widget: object
            required: true
            fields:
              - name: projects
                label: Projects section
                widget: object
                required: true
                fields:
                  - { name: eyebrow, label: 'Projects eyebrow', widget: string, required: true }
                  - { name: titlePre, label: 'Projects heading — before accent', widget: string, required: true }
                  - { name: titleAccent, label: 'Projects heading — accent word', widget: string, required: true }
                  - { name: titlePost, label: 'Projects heading — after accent', widget: string, required: true }
                  - { name: allLink, label: '"All projects" link label', widget: string, required: true }
              - name: skills
                label: Skills section
                widget: object
                required: true
                fields:
                  - { name: eyebrow, label: 'Skills eyebrow', widget: string, required: true }
                  - { name: titlePre, label: 'Skills heading — before accent 1', widget: string, required: true }
                  - { name: titleAccent1, label: 'Skills heading — accent 1', widget: string, required: true }
                  - { name: titleMid, label: 'Skills heading — between accents', widget: string, required: true }
                  - { name: titleAccent2, label: 'Skills heading — accent 2', widget: string, required: true }
                  - { name: titlePost, label: 'Skills heading — after accent 2', widget: string, required: true }
              - name: news
                label: News section
                widget: object
                required: true
                fields:
                  - { name: eyebrow, label: 'News eyebrow', widget: string, required: true }
                  - { name: titlePre, label: 'News heading — before accent', widget: string, required: true }
                  - { name: titleAccent, label: 'News heading — accent word', widget: string, required: true }
                  - { name: titlePost, label: 'News heading — after accent', widget: string, required: true }
                  - { name: allLink, label: '"All updates" link label', widget: string, required: true }
              - name: github
                label: GitHub section
                widget: object
                required: true
                fields:
                  - { name: eyebrow, label: 'GitHub eyebrow', widget: string, required: true }
                  - { name: titlePre, label: 'GitHub heading — before accent', widget: string, required: true }
                  - { name: titleAccent, label: 'GitHub heading — accent word', widget: string, required: true }
                  - { name: titlePost, label: 'GitHub heading — after accent', widget: string, required: true }
                  - name: statLabels
                    label: Stat tile labels
                    widget: object
                    required: true
                    fields:
                      - { name: repos, label: 'Public repos label', widget: string, required: true }
                      - { name: stars, label: 'Stars label', widget: string, required: true }
                      - { name: commits, label: 'Commits label', widget: string, required: true }
                  - { name: topLanguages, label: '"Top languages" label', widget: string, required: true }
                  - { name: loadingLanguages, label: 'Languages loading text', widget: string, required: true }
                  - { name: loadingRepos, label: 'Repos loading text', widget: string, required: true }
              - name: resume
                label: Resume section
                widget: object
                required: true
                fields:
                  - { name: eyebrow, label: 'Resume eyebrow', widget: string, required: true }
                  - { name: titlePre, label: 'Resume heading — before accent', widget: string, required: true }
                  - { name: titleAccent, label: 'Resume heading — accent words', widget: string, required: true }
                  - { name: titlePost, label: 'Resume heading — after accent', widget: string, required: true }
                  - { name: intro, label: 'Resume intro paragraph', widget: text, required: true }
                  - { name: downloadLabel, label: 'Download button label', widget: string, required: true }
                  - { name: openInTabLabel, label: '"Open in tab" button label', widget: string, required: true }
                  - { name: editHint, label: 'Edit hint (mono text)', widget: string, required: true }
                  - { name: previewUnavailable, label: 'PDF preview-unavailable text', widget: string, required: true }
                  - { name: downloadFileLabel, label: 'Fallback download link label', widget: string, required: true }
                  - { name: fileName, label: 'Displayed file name (mobile card)', widget: string, required: true }

          - name: contact
            label: Contact
            widget: object
            required: true
            fields:
              - { name: eyebrow, label: 'Contact eyebrow', widget: string, required: true }
              - { name: titlePre, label: 'Contact heading — before accent', widget: string, required: true }
              - { name: titleAccent, label: 'Contact heading — accent word', widget: string, required: true }
              - { name: titlePost, label: 'Contact heading — after accent', widget: string, required: true }
              - { name: intro, label: 'Contact intro line', widget: string, required: true }
              - name: methods
                label: Contact methods
                widget: object
                required: true
                fields:
                  - name: email
                    label: Email method
                    widget: object
                    required: true
                    fields:
                      - { name: label, label: 'Card label', widget: string, required: true }
                      - { name: handle, label: 'Displayed handle', widget: string, required: true }
                  - name: github
                    label: GitHub method
                    widget: object
                    required: true
                    fields:
                      - { name: label, label: 'Card label', widget: string, required: true }
                      - { name: handle, label: 'Displayed handle', widget: string, required: true }
                  - name: linkedin
                    label: LinkedIn method
                    widget: object
                    required: true
                    fields:
                      - { name: label, label: 'Card label', widget: string, required: true }
                      - { name: handle, label: 'Displayed handle', widget: string, required: true }

          - name: footer
            label: Footer
            widget: object
            required: true
            fields:
              - { name: name, label: 'Footer name', widget: string, required: true }
              - { name: tagline, label: 'Footer tagline', widget: string, required: true }
              - { name: locationSuffix, label: 'Footer copyright location', widget: string, required: true }

          - name: socials
            label: Social links
            widget: object
            required: true
            fields:
              - { name: github, label: 'GitHub profile URL', widget: string, required: true }
              - { name: linkedin, label: 'LinkedIn profile URL', widget: string, required: true }
              - { name: email, label: 'Email address (no mailto:)', widget: string, required: true }
